
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Away</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Cinzel+Decorative:wght@400;700&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Josefin Sans', sans-serif;
            background-color: #FDFBF7; /* Light vintage parchment */
            color: #1A231C; /* Dark forest ink */
            margin: 0;
            overflow-x: hidden;
        }
        .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }
        .font-decorative {
            font-family: 'Cinzel Decorative', serif;
        }
        
        @keyframes slow-pan {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        .bg-victorian-collage {
            background-image: url('/src/assets/images/light_quirky_bg_1782337798059.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }
        
        .bg-victorian-collage::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(253, 251, 247, 0.4) 0%, rgba(253, 251, 247, 0.95) 100%);
            z-index: 0;
        }

        .content-layer {
            position: relative;
            z-index: 1;
        }

        .perspective-1000 {
            perspective: 1200px;
        }
        .preserve-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }

        /* Victorian Ornate Border utility */
        .victorian-border {
            border: 1px solid rgba(26, 35, 28, 0.2);
            position: relative;
        }
        .victorian-border::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid rgba(26, 35, 28, 0.1);
            pointer-events: none;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(253, 251, 247, 0.5); 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(26, 35, 28, 0.3); 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(26, 35, 28, 0.5); 
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.36.0",

    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-victorian-collage min-h-screen">
    <div id="root" class="content-layer min-h-screen"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
